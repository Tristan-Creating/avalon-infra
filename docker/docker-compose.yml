name: avalon-infra

# Avalon University — self-hosted data platform
# Postgres (OLTP + warehouse) · Kafka (KRaft) · Prometheus / Grafana monitoring

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16.6
    container_name: avalon-postgres
    <<: *restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avalon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avalon_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-avalon}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avalon} -d ${POSTGRES_DB:-avalon}"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [avalon]

  kafka:
    image: apache/kafka:3.9.0
    container_name: avalon-kafka
    <<: *restart
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: avalon-kraft-cluster-001
    ports:
      - "9094:9094"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks: [avalon]

  # one-shot: creates the topics used by the Block 3 pipeline, then exits
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: avalon-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic avalon.enrollments --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic avalon.course_events --partitions 3 --replication-factor 1 &&
      echo 'Topics ready:' &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
      "
    networks: [avalon]

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: avalon-kafka-ui
    <<: *restart
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: avalon
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks: [avalon]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: avalon-postgres-exporter
    <<: *restart
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-avalon}:${POSTGRES_PASSWORD:-avalon_dev_password}@postgres:5432/${POSTGRES_DB:-avalon}?sslmode=disable
    networks: [avalon]

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    container_name: avalon-kafka-exporter
    <<: *restart
    depends_on:
      kafka:
        condition: service_healthy
    command: ["--kafka.server=kafka:9092"]
    networks: [avalon]

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: avalon-prometheus
    <<: *restart
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    networks: [avalon]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: avalon-grafana
    <<: *restart
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-avalon_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks: [avalon]

volumes:
  pgdata:
  kafkadata:
  promdata:
  grafanadata:

networks:
  avalon:
    name: avalon
